name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"

jobs:
  build:
    name: Build and test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set XCode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Setup mock API key
        run: |
          echo "API_KEY = API_KEY" >> User.xcconfig

      - name: Build
        run: |
          xcodebuild \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGN_STYLE='Automatic' \
            -project Civics.xcodeproj \
            -scheme Civics \
            -destination 'platform=macOS,arch=arm64' \
            clean build analyze | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          xcodebuild \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGN_STYLE='Automatic' \
            -project Civics.xcodeproj \
            -scheme Civics \
            -destination 'platform=macOS,arch=arm64' \
            test | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
